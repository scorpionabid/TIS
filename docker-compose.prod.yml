services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: atis_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    networks:
      - atis_network

  # Laravel Backend
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: atis_backend
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=pgsql
      - DB_HOST=atis_postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-atis_production}
      - DB_USERNAME=${DB_USERNAME:-atis_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - CACHE_STORE=redis
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - BROADCAST_CONNECTION=reverb
    ports:
      - "8000:8000"
      - "8080:8080"
    volumes:
      - ./backend/storage:/var/www/html/storage
    depends_on:
      postgres_v2:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - atis_network

  # Queue Worker (ayrı proses — production-da mütləq lazımdır)
  queue-worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: atis_queue_worker
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --queue=default,notifications
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=pgsql
      - DB_HOST=atis_postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-atis_production}
      - DB_USERNAME=${DB_USERNAME:-atis_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - CACHE_STORE=redis
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    volumes:
      - ./backend/storage:/var/www/html/storage
    depends_on:
      postgres_v2:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - atis_network

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: atis_frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - VITE_API_URL=https://atis.edu.az/api
    networks:
      - atis_network

  # PostgreSQL Database (postgres:16 — dev ilə eyni versiya)
  postgres_v2:
    image: postgres:16-alpine
    container_name: atis_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_DATABASE:-atis_production}
      - POSTGRES_USER=${DB_USERNAME:-atis_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    # ⚠️ PORT: n8n 5433 istifadə edir — konflikt riski var!
    # Production serverdə: n8n=5433, ATİS=5434
    ports:
      - "5434:5432"
    command: >
      postgres
        -c shared_buffers=512MB
        -c effective_cache_size=1536MB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c max_connections=100
        -c log_min_duration_statement=1000
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
      - ./database-backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-atis_user} -d ${DB_DATABASE:-atis_production}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atis_network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: atis_redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atis_network

networks:
  atis_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
