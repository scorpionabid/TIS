services:
  # Laravel Backend
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: atis_backend
    restart: unless-stopped
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=base64:IcNxbQiy6sWLjfrgaSlGkm4S2utYBz+DXj4u/Rt7g0k=
      - DB_CONNECTION=pgsql
      - DB_HOST=atis_postgres
      - DB_PORT=5432
      - DB_DATABASE=atis_dev
      - DB_USERNAME=atis_dev_user
      - DB_PASSWORD=atis_dev_pass_123
      - CACHE_STORE=redis
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      - REDIS_DB=0
      - BROADCAST_CONNECTION=reverb
      - QUEUE_CONNECTION=redis
      - REVERB_APP_ID=atis-app
      - REVERB_APP_KEY=atis-reverb-key
      - REVERB_APP_SECRET=atis-reverb-secret
      - REVERB_HOST=localhost
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
    ports:
      - "8000:8000"
      - "8080:8080"
    volumes:
      - ./backend/database:/var/www/html/database
      - ./backend/storage:/var/www/html/storage
      - ./backend/app:/var/www/html/app
      - ./backend/routes:/var/www/html/routes
      - ./backend/config:/var/www/html/config
      - ./backend/tests:/var/www/html/tests
      - ./backend/public:/var/www/html/public
      - ./backend/bootstrap:/var/www/html/bootstrap
    depends_on:
      postgres_v2:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - atis_network

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: atis_frontend
    restart: unless-stopped
    environment:
      - VITE_LOCAL_API_URL=http://localhost:8000/api
      - VITE_LOCAL_APP_URL=http://localhost:3000
      - NODE_ENV=development
    command: sh -c "npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - atis_network

  # Redis Cache Server (Phase 2A optimization)
  redis:
    image: redis:7-alpine
    container_name: atis_redis
    restart: unless-stopped
    # Ports removed - only accessible within Docker network
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - atis_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Database Server
  postgres_v2:
    image: postgres:16-alpine
    container_name: atis_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=atis_dev
      - POSTGRES_USER=atis_dev_user
      - POSTGRES_PASSWORD=atis_dev_pass_123
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - atis_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atis_dev_user -d atis_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  atis_network:
    driver: bridge

volumes:
  redis_data:
    driver: local
  frontend_node_modules:
    driver: local
  postgres_data_v2:
    driver: local
