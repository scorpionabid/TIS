services:
  # Laravel Backend
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: atis_backend
    restart: unless-stopped
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=base64:IcNxbQiy6sWLjfrgaSlGkm4S2utYBz+DXj4u/Rt7g0k=
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=pgsql
      - DB_HOST=atis_postgres
      - DB_PORT=5432
      - DB_DATABASE=atis_production
      - DB_USERNAME=atis_prod_user
      - DB_PASSWORD=Pqan1xlUez1lRskN8X1koC2JS
      - CACHE_STORE=redis
      - SESSION_DRIVER=file
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      - REDIS_DB=0
      - SANCTUM_STATEFUL_DOMAINS=localhost:3000,127.0.0.1:3000,localhost:8000
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - SESSION_DOMAIN=null
      - SESSION_SECURE_COOKIE=false
      - SESSION_SAME_SITE=lax
      - BROADCAST_CONNECTION=reverb
      - QUEUE_CONNECTION=redis
      - REVERB_APP_ID=atis-app
      - REVERB_APP_KEY=atis-reverb-key
      - REVERB_APP_SECRET=atis-reverb-secret
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
      - REVERB_PUBLIC_HOST=atis.sim.edu.az
      - REVERB_PUBLIC_PORT=443
    ports:
      - "8000:8000"
      - "8080:8080"
    volumes:
      - ./backend/.env:/var/www/html/.env
      - ./backend/database:/var/www/html/database
      - ./backend/storage:/var/www/html/storage
      - ./backend/app:/var/www/html/app
      - ./backend/routes:/var/www/html/routes
      - ./backend/config:/var/www/html/config
      - ./backend/tests:/var/www/html/tests
      - ./backend/public:/var/www/html/public
      - ./backend/bootstrap:/var/www/html/bootstrap
    depends_on:
      postgres_v2:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - atis_network

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: atis_frontend
    restart: unless-stopped
    environment:
      - VITE_LOCAL_API_URL=http://localhost:8000/api
      - VITE_LOCAL_APP_URL=http://localhost:3000
      - VITE_API_BASE_URL=https://atis.sim.edu.az/api
      - NODE_ENV=development
    command: sh -c "npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - atis_network

  # Redis Cache Server (Phase 2A optimization)
  redis:
    image: redis:7-alpine
    container_name: atis_redis
    restart: unless-stopped
    # Ports removed - only accessible within Docker network
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - atis_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Database Server
  postgres_v2:
    image: postgres:16-alpine
    container_name: atis_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=atis_production
      - POSTGRES_USER=atis_prod_user
      - POSTGRES_PASSWORD=Pqan1xlUez1lRskN8X1koC2JS
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    ports:
      - "5434:5432"
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=16MB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c max_connections=100
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - atis_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atis_prod_user -d atis_production"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  atis_network:
    driver: bridge

volumes:
  redis_data:
    driver: local
  frontend_node_modules:
    driver: local
  postgres_data:
    driver: local
